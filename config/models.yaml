# DLNT v2 モデル設定
# Phase 1: 全エージェントが同一モデルを使用
# 将来: エージェントごとにモデルを指定可能

models:
  default: gpt-oss:20b
  agents:
    scout: gpt-oss:20b
    coder: gpt-oss:20b
    archivist: gpt-oss:20b
    scribe: gpt-oss:20b

ollama:
  base_url: http://host.docker.internal:11434
  timeout: 120
  # Ollamaは1モデルをメモリ保持。別モデル呼び出し時スワップが発生する
  # 24GBで20b(13GB)の余裕: ~11GB

embedding:
  model: intfloat/multilingual-e5-small
  dimension: 384
  # CPU推論 ~100ms/文 (sentence-transformers)

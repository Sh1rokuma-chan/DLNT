# ============================================================
# MyAI Local - 統合 Docker Compose
# ============================================================
# アクセス先:
#   http://localhost/       → Chat UI (Open WebUI / ChatGPT風)
#   http://localhost/agent/ → Agent Dashboard (2ペイン)
#   http://localhost:8888/  → Dify 管理画面
#   http://localhost:19999/ → Netdata リソース監視
#   Ollama: ホスト側 localhost:11434 (Docker管理外)
# ============================================================

x-dify-shared-env: &dify-shared-env
  # --- URLs ---
  CONSOLE_API_URL: ${CONSOLE_API_URL:-http://localhost:8888}
  CONSOLE_WEB_URL: ${CONSOLE_WEB_URL:-http://localhost:8888}
  SERVICE_API_URL: ${SERVICE_API_URL:-http://localhost:8888}
  APP_API_URL: ${APP_API_URL:-http://localhost:8888}
  APP_WEB_URL: ${APP_WEB_URL:-http://localhost:8888}
  FILES_URL: ${FILES_URL:-http://localhost:8888}
  INTERNAL_FILES_URL: ${INTERNAL_FILES_URL:-http://api:5001}
  TRIGGER_URL: ${TRIGGER_URL:-http://localhost:8888}
  # --- Encoding ---
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  PYTHONIOENCODING: utf-8
  UV_CACHE_DIR: /tmp/.uv-cache
  # --- Logging ---
  LOG_LEVEL: INFO
  LOG_OUTPUT_FORMAT: text
  LOG_FILE: /app/logs/server.log
  LOG_FILE_MAX_SIZE: 20
  LOG_FILE_BACKUP_COUNT: 5
  LOG_DATEFORMAT: "%Y-%m-%d %H:%M:%S"
  LOG_TZ: Asia/Tokyo
  DEBUG: "false"
  FLASK_DEBUG: "false"
  ENABLE_REQUEST_LOGGING: "False"
  # --- Security ---
  SECRET_KEY: ${SECRET_KEY}
  INIT_PASSWORD: ${INIT_PASSWORD:-LocalAI2026!}
  DEPLOY_ENV: ${DEPLOY_ENV:-PRODUCTION}
  CHECK_UPDATE_URL: ""
  OPENAI_API_BASE: https://api.openai.com/v1
  MIGRATION_ENABLED: "true"
  FILES_ACCESS_TIMEOUT: 300
  ACCESS_TOKEN_EXPIRE_MINUTES: 60
  REFRESH_TOKEN_EXPIRE_DAYS: 30
  APP_DEFAULT_ACTIVE_REQUESTS: 0
  APP_MAX_ACTIVE_REQUESTS: 0
  APP_MAX_EXECUTION_TIME: 1200
  # --- Server ---
  DIFY_BIND_ADDRESS: 0.0.0.0
  DIFY_PORT: 5001
  SERVER_WORKER_AMOUNT: 1
  SERVER_WORKER_CLASS: gevent
  SERVER_WORKER_CONNECTIONS: 10
  GUNICORN_TIMEOUT: 360
  CELERY_WORKER_CLASS: ""
  CELERY_WORKER_AMOUNT: ""
  CELERY_AUTO_SCALE: "false"
  API_TOOL_DEFAULT_CONNECT_TIMEOUT: 10
  API_TOOL_DEFAULT_READ_TIMEOUT: 60
  # --- Database ---
  DB_TYPE: postgresql
  DB_USERNAME: ${DB_USERNAME:-dify}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-dify}
  SQLALCHEMY_POOL_SIZE: 30
  SQLALCHEMY_MAX_OVERFLOW: 10
  SQLALCHEMY_POOL_RECYCLE: 3600
  SQLALCHEMY_ECHO: "false"
  SQLALCHEMY_POOL_PRE_PING: "false"
  SQLALCHEMY_POOL_TIMEOUT: 30
  POSTGRES_MAX_CONNECTIONS: 100
  POSTGRES_SHARED_BUFFERS: 256MB
  POSTGRES_WORK_MEM: 4MB
  POSTGRES_MAINTENANCE_WORK_MEM: 64MB
  POSTGRES_EFFECTIVE_CACHE_SIZE: 4096MB
  POSTGRES_STATEMENT_TIMEOUT: 0
  # --- Redis ---
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_USERNAME: ""
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_USE_SSL: "false"
  REDIS_DB: 0
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
  CELERY_BACKEND: redis
  # --- CORS (localhost のみ許可) ---
  WEB_API_CORS_ALLOW_ORIGINS: "http://localhost,http://localhost:8888,http://127.0.0.1,http://127.0.0.1:8888"
  CONSOLE_CORS_ALLOW_ORIGINS: "http://localhost:8888,http://localhost"
  # --- Storage ---
  STORAGE_TYPE: opendal
  OPENDAL_SCHEME: fs
  OPENDAL_FS_ROOT: storage
  # --- Vector Store (Qdrant) ---
  VECTOR_STORE: qdrant
  QDRANT_URL: http://qdrant:6333
  QDRANT_API_KEY: ${QDRANT_API_KEY}
  QDRANT_CLIENT_TIMEOUT: 20
  QDRANT_GRPC_ENABLED: "false"
  QDRANT_GRPC_PORT: 6334
  QDRANT_REPLICATION_FACTOR: 1
  # --- Sandbox ---
  CODE_EXECUTION_ENDPOINT: http://sandbox:8194
  CODE_EXECUTION_API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
  CODE_MAX_STRING_LENGTH: 400000
  CODE_MAX_STRING_ARRAY_LENGTH: 30
  CODE_MAX_DEPTH: 5
  # --- Plugin Daemon ---
  PLUGIN_DAEMON_URL: http://plugin-daemon:5002
  PLUGIN_DAEMON_PORT: 5002
  PLUGIN_DIFY_INNER_API_KEY: ${PLUGIN_INNER_API_KEY}
  PLUGIN_DIFY_INNER_API_URL: http://api:5001
  PLUGIN_MAX_PACKAGE_SIZE: 52428800
  PLUGIN_MAX_EXECUTION_TIMEOUT: 600
  PLUGIN_DAEMON_TIMEOUT: "600.0"
  PLUGIN_STORAGE_TYPE: local
  PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
  PLUGIN_WORKING_PATH: /app/storage/cwd
  PLUGIN_INSTALLED_PATH: plugin
  PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
  PLUGIN_MEDIA_CACHE_PATH: assets
  FORCE_VERIFYING_SIGNATURE: "true"
  MARKETPLACE_ENABLED: "true"
  MARKETPLACE_API_URL: https://marketplace.dify.ai
  # --- Workflow ---
  WORKFLOW_MAX_EXECUTION_STEPS: 500
  WORKFLOW_MAX_EXECUTION_TIME: 1200
  MAX_VARIABLE_SIZE: 204800
  # --- Upload limits ---
  UPLOAD_FILE_SIZE_LIMIT: 15
  UPLOAD_FILE_BATCH_LIMIT: 5
  UPLOAD_IMAGE_FILE_SIZE_LIMIT: 10
  UPLOAD_VIDEO_FILE_SIZE_LIMIT: 100
  UPLOAD_AUDIO_FILE_SIZE_LIMIT: 50
  # --- Misc ---
  ENABLE_WEBSITE_JINAREADER: "true"
  ENABLE_WEBSITE_FIRECRAWL: "true"
  ENABLE_WEBSITE_WATERCRAWL: "true"
  NEXT_PUBLIC_ENABLE_SINGLE_DOLLAR_LATEX: "false"

services:

  # ─────────────────────────────────────────────────────────
  # 初期化 (Dify storageディレクトリのパーミッション設定)
  # ─────────────────────────────────────────────────────────
  init-permissions:
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        FLAG_FILE="/app/api/storage/.init_done"
        if [ -f "$$FLAG_FILE" ]; then
          echo "Already initialized. Skipping."
          exit 0
        fi
        echo "Initializing storage permissions..."
        chown -R 1001:1001 /app/api/storage && touch "$$FLAG_FILE"
        echo "Done."
    volumes:
      - ./dify/volumes/storage:/app/api/storage
    restart: "no"
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # Dify API
  # ─────────────────────────────────────────────────────────
  api:
    image: langgenius/dify-api:1.13.0
    restart: always
    environment:
      <<: *dify-shared-env
      MODE: api
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_INNER_API_KEY}
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./dify/volumes/storage:/app/api/storage
    networks:
      - dify-net
      - ssrf-net

  # ─────────────────────────────────────────────────────────
  # Dify Worker (Celery)
  # ─────────────────────────────────────────────────────────
  worker:
    image: langgenius/dify-api:1.13.0
    restart: always
    environment:
      <<: *dify-shared-env
      MODE: worker
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_INNER_API_KEY}
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./dify/volumes/storage:/app/api/storage
    networks:
      - dify-net
      - ssrf-net

  # ─────────────────────────────────────────────────────────
  # Dify Worker Beat (スケジューラ)
  # ─────────────────────────────────────────────────────────
  worker-beat:
    image: langgenius/dify-api:1.13.0
    restart: always
    environment:
      <<: *dify-shared-env
      MODE: beat
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # Dify Web (Next.js 管理画面フロントエンド)
  # ─────────────────────────────────────────────────────────
  web:
    image: langgenius/dify-web:1.13.0
    restart: always
    environment:
      CONSOLE_API_URL: ${CONSOLE_API_URL:-http://localhost:8888}
      APP_API_URL: ${APP_API_URL:-http://localhost:8888}
      NEXT_TELEMETRY_DISABLED: 1
      TEXT_GENERATION_TIMEOUT_MS: 60000
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      MARKETPLACE_URL: https://marketplace.dify.ai
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # Dify Nginx (Dify管理画面専用、ポート8888で公開)
  # ─────────────────────────────────────────────────────────
  dify-nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./dify/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8888:80"
    depends_on:
      - api
      - web
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # Plugin Daemon
  # ─────────────────────────────────────────────────────────
  plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    restart: always
    environment:
      <<: *dify-shared-env
      DB_DATABASE: dify_plugin
      SERVER_PORT: 5002
      SERVER_KEY: ${PLUGIN_DAEMON_KEY}
      MAX_PLUGIN_PACKAGE_SIZE: 52428800
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: ${PLUGIN_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PYTHON_ENV_INIT_TIMEOUT: 120
    volumes:
      - ./dify/volumes/plugin_daemon:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # Dify Sandbox (コード実行環境)
  # ─────────────────────────────────────────────────────────
  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    restart: always
    environment:
      API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://ssrf-proxy:3128
      HTTPS_PROXY: http://ssrf-proxy:3128
      SANDBOX_PORT: 8194
    volumes:
      - ./dify/volumes/sandbox/dependencies:/dependencies
      - ./dify/volumes/sandbox/conf:/conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssrf-net

  # ─────────────────────────────────────────────────────────
  # SSRF Proxy (セキュリティプロキシ)
  # ─────────────────────────────────────────────────────────
  ssrf-proxy:
    image: ubuntu/squid:latest
    restart: always
    volumes:
      - ./ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template:ro
      - ./ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh:ro
    entrypoint:
      - sh
      - -c
      - "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh"
    environment:
      HTTP_PORT: 3128
      COREDUMP_DIR: /var/spool/squid
      REVERSE_PROXY_PORT: 8194
      SANDBOX_HOST: sandbox
      SANDBOX_PORT: 8194
    networks:
      - ssrf-net
      - dify-net

  # ─────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-dify}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-dify}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
        -c 'max_connections=100'
        -c 'shared_buffers=256MB'
        -c 'work_mem=4MB'
        -c 'maintenance_work_mem=64MB'
        -c 'effective_cache_size=4096MB'
    volumes:
      - ./dify/volumes/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "${DB_USERNAME:-dify}", "-d", "${DB_DATABASE:-dify}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:6-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - ./dify/volumes/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # Qdrant (ベクトルDB)
  # ─────────────────────────────────────────────────────────
  qdrant:
    image: langgenius/qdrant:v1.8.3
    restart: always
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    volumes:
      - ./dify/volumes/qdrant:/qdrant/storage
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # MCP Server (ローカルファイルシステムアクセス)
  # ─────────────────────────────────────────────────────────
  mcp-server:
    image: node:20-alpine
    restart: always
    working_dir: /app
    command: node runner.js
    environment:
      MCP_WORKSPACE_DIR: /workspace
      PORT: 8808
    volumes:
      - ./mcp-servers:/app:ro
      - /Users/shirokuma-papa-pro/Documents:/workspace:ro
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # SearXNG (ローカルWeb検索エンジン)
  # エージェントからHTTPリクエストで利用: http://searxng:8080/search?q=...&format=json
  # ─────────────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    restart: always
    volumes:
      - ./searxng:/etc/searxng
    environment:
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET_KEY:-myai-searxng-local-secret-key-2026}
      BASE_URL: http://localhost:8080/
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # Whisper API (ローカル音声文字起こし, OpenAI互換)
  # エンドポイント: POST http://whisper-api:8000/v1/audio/transcriptions
  # ─────────────────────────────────────────────────────────
  whisper-api:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: always
    environment:
      WHISPER__MODEL: ${WHISPER_MODEL:-small}
      WHISPER__LANGUAGE: ja
    networks:
      - dify-net

  # ─────────────────────────────────────────────────────────
  # Open WebUI (ChatGPT風 Chat UI)
  # ─────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: always
    environment:
      # ブランド設定
      WEBUI_NAME: ${WEBUI_NAME:-MyAI}
      # Ollama接続 (ホスト側)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # 認証無効化 (ローカル専用)
      WEBUI_AUTH: "False"
      # デフォルトモデル
      DEFAULT_MODELS: "gpt-oss:20b"
      # セッション設定
      ENABLE_SIGNUP: "False"
      DEFAULT_USER_ROLE: admin
      # ログレベル
      GLOBAL_LOG_LEVEL: WARNING
    volumes:
      - ./open-webui/custom.css:/app/backend/static/custom.css:ro
      - open-webui-data:/app/backend/data
    networks:
      - frontend-net
      - dify-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────────────────────
  # Agent UI (2ペインダッシュボード)
  # ─────────────────────────────────────────────────────────
  agent-ui:
    build:
      context: ./agent-ui
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 3002
      OLLAMA_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DIFY_BASE_URL: http://dify-nginx/v1
      MCP_SERVER_URL: http://mcp-server:8808/sse
      SEARXNG_URL: http://searxng:8080
      WHISPER_URL: http://whisper-api:8000
      # Dify各エージェントのAPIキー (Dify管理画面でアプリ作成後に設定)
      DIFY_API_KEY_RESEARCH: ${DIFY_API_KEY_RESEARCH:-}
      DIFY_API_KEY_TASK: ${DIFY_API_KEY_TASK:-}
      DIFY_API_KEY_MINUTES: ${DIFY_API_KEY_MINUTES:-}
    networks:
      - frontend-net
      - dify-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - agent-ui-data:/app/data
    depends_on:
      - api
      - searxng
      - whisper-api

  # ─────────────────────────────────────────────────────────
  # Master Nginx (ChatUI + AgentUI を :80 でルーティング)
  # ─────────────────────────────────────────────────────────
  master-nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - open-webui
      - agent-ui
    networks:
      - frontend-net

  # ─────────────────────────────────────────────────────────
  # Netdata (リソース監視 → http://localhost:19999)
  # ─────────────────────────────────────────────────────────
  netdata:
    image: netdata/netdata:stable
    restart: always
    pid: host
    # macOS Docker Desktop では network_mode:host はポート転送不可。
    # ブリッジ+ports で明示的に公開する。
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
    environment:
      - NETDATA_DISABLE_CLOUD=1
      - NETDATA_CLAIM_TOKEN=
      - DOCKER_HOST=unix:///var/run/docker.sock

# ─────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────
networks:
  frontend-net:
    driver: bridge
  dify-net:
    driver: bridge
  ssrf-net:
    driver: bridge
    internal: true

# ─────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────
volumes:
  open-webui-data:
  agent-ui-data:
  netdata-config:
  netdata-lib:
  netdata-cache:

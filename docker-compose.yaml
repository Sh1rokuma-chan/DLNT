# ============================================================
# MyAI Local — 統合 Docker Compose (v3: Dify-free)
# ============================================================
# アクセス先:
#   http://localhost/         → Open WebUI (汎用チャット)
#   http://localhost/agent/   → Agent Dashboard (調査・タスク・議事録)
#   http://localhost:19999/   → Netdata リソース監視
#   Ollama: ホスト側 localhost:11434 (Docker管理外)
# ============================================================

services:

  # ─────────────────────────────────────────────────────────
  # PostgreSQL (pgvector 対応)
  # ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  # ─────────────────────────────────────────────────────────
  # FastAPI (バックエンドAPI)
  # ─────────────────────────────────────────────────────────
  api:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/app}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net

  # ─────────────────────────────────────────────────────────
  # SearXNG (ローカルWeb検索エンジン)
  # ─────────────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    restart: always
    volumes:
      - ./searxng:/etc/searxng
    environment:
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET_KEY:-myai-searxng-local-secret-key-2026}
      BASE_URL: http://localhost:8080/
    networks:
      - backend-net

  # ─────────────────────────────────────────────────────────
  # Whisper API (ローカル音声文字起こし, OpenAI互換)
  # ─────────────────────────────────────────────────────────
  whisper-api:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: always
    environment:
      WHISPER__MODEL: ${WHISPER_MODEL:-small}
      WHISPER__LANGUAGE: ja
    networks:
      - backend-net

  # ─────────────────────────────────────────────────────────
  # Open WebUI (ChatGPT風 Chat UI)
  # ─────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: always
    environment:
      WEBUI_NAME: ${WEBUI_NAME:-MyAI}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      WEBUI_AUTH: "False"
      DEFAULT_MODELS: ${OLLAMA_MODEL:-gpt-oss:20b}
      ENABLE_SIGNUP: "False"
      DEFAULT_USER_ROLE: admin
      GLOBAL_LOG_LEVEL: WARNING
    volumes:
      - ./open-webui/custom.css:/app/backend/static/custom.css:ro
      - open-webui-data:/app/backend/data
    networks:
      - frontend-net
      - backend-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────────────────────
  # Agent UI (3エージェント + チャット ダッシュボード)
  # ─────────────────────────────────────────────────────────
  agent-ui:
    build:
      context: ./agent-ui
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 3002
      OLLAMA_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:20b}
      SEARXNG_URL: http://searxng:8080
      WHISPER_URL: http://whisper-api:8000
    networks:
      - frontend-net
      - backend-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - agent-ui-data:/app/data
    depends_on:
      - searxng
      - whisper-api

  # ─────────────────────────────────────────────────────────
  # Master Nginx (Open WebUI + Agent UI を :80 でルーティング)
  # ─────────────────────────────────────────────────────────
  master-nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - open-webui
      - agent-ui
    networks:
      - frontend-net

  # ─────────────────────────────────────────────────────────
  # Netdata (リソース監視 → http://localhost:19999)
  # ─────────────────────────────────────────────────────────
  netdata:
    image: netdata/netdata:stable
    restart: always
    pid: host
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
    environment:
      - NETDATA_DISABLE_CLOUD=1
      - NETDATA_CLAIM_TOKEN=
      - DOCKER_HOST=unix:///var/run/docker.sock

# ─────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

# ─────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────
volumes:
  postgres-data:
  open-webui-data:
  agent-ui-data:
  netdata-config:
  netdata-lib:
  netdata-cache:

# ============================================================
# Master Nginx - MyAI Local
# ポート80: ChatUI (/) と AgentUI (/agent/) のルーティング
# Dify管理画面はポート8888で直接公開
# ============================================================

# SSEストリーミング対応のバッファ設定
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    # タイムアウト (LLM推論の長時間ストリーミングに対応)
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 60s;

    # ── セキュリティヘッダー ────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                           always;
    add_header X-Frame-Options         "SAMEORIGIN"                        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    add_header X-XSS-Protection        "1; mode=block"                     always;
    # サーバー情報を隠蔽
    server_tokens off;

    # ── /agent/ → Agent Dashboard (2ペイン) ─────────────────
    # ※ catch-all より前に定義する必要あり
    location /agent/ {
        proxy_pass         http://agent-ui:3002/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSEストリーミング必須設定
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;

        client_max_body_size 50M;
    }

    # ── / → Open WebUI (ChatGPT風) ───────────────────────────
    # SvelteKitのアセットは絶対パス (/assets/...) で埋め込まれるため
    # サブパス (/chat/) での提供は不可。ルートで提供する。
    location / {
        proxy_pass         http://open-webui:8080;
        proxy_http_version 1.1;

        # WebSocket対応 (Open WebUIのリアルタイム通信)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE/ストリーミング対応
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        client_max_body_size 100M;
    }
}

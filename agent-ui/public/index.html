<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyAI Agent Dashboard v3</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo-icon">M</div>
        <div>
          <h1>MyAI</h1>
          <p>Agent Dashboard v3</p>
        </div>
      </div>

      <div class="quick-actions">
        <button class="btn btn-primary" onclick="newChat()">+ 新規会話</button>
      </div>

      <nav class="agent-nav" id="agent-tabs">
        <button class="agent-tab" data-agent="chat" onclick="switchAgent('chat')">💬 チャット</button>
        <button class="agent-tab" data-agent="research" onclick="switchAgent('research')">🔍 調査</button>
        <button class="agent-tab" data-agent="task" onclick="switchAgent('task')">🧠 タスク</button>
        <button class="agent-tab" data-agent="minutes" onclick="switchAgent('minutes')">📝 議事録</button>
      </nav>

      <div class="status-card">
        <div class="status-head">システム状態</div>
        <div class="status-badge">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">接続確認中...</span>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <div class="panel-label">現在のエージェント</div>
          <div class="agent-pill" id="pane-agent-tag">Ollama直接</div>
        </div>
        <select id="model-select" title="Ollamaモデルを選択"></select>
      </header>

      <section class="content-grid">
        <section class="chat-pane panel">
          <div class="panel-title">Conversation</div>
          <div id="chat-messages"></div>
        </section>

        <section class="log-pane panel">
          <div class="panel-title">Workflow Log</div>
          <div id="workflow-log"></div>
        </section>
      </section>

      <section class="composer panel">
        <div class="agent-config" id="agent-config">
          <div class="config-row">
            <label>API Key</label>
            <input type="password" class="config-input" id="api-key-input" placeholder="app-xxxxxxxxxxxx (未設定の場合は環境変数から自動取得)" />
          </div>
          <div id="minutes-config" style="display:none; flex-direction:column; gap:6px;">
            <div class="config-row">
              <label>会議タイトル</label>
              <input type="text" class="config-input" id="meeting-title" placeholder="例: 週次定例ミーティング" />
            </div>
            <div class="config-row">
              <label>出力形式</label>
              <select class="config-select" id="minutes-format">
                <option value="標準議事録">標準議事録</option>
                <option value="アクションアイテム重視">アクションアイテム重視</option>
                <option value="要約のみ">要約のみ</option>
              </select>
            </div>
          </div>
        </div>

        <div class="audio-area" id="audio-area">
          <div class="audio-file-label">🎵 音声ファイルをアップロードするか、マイクで録音してください</div>
          <div class="audio-controls">
            <button class="btn-audio" id="btn-record" onclick="toggleRecording()">🎙️ 録音開始</button>
            <button class="btn-audio" onclick="document.getElementById('audio-file-input').click()">📁 ファイル選択</button>
            <input type="file" id="audio-file-input" accept="audio/*,.mp3,.m4a,.wav,.ogg,.webm" onchange="handleAudioFile(this)" />
            <span class="audio-status" id="audio-status">音声なし (テキスト入力も使用可)</span>
          </div>
        </div>

        <div class="input-row">
          <textarea id="message-input" rows="1" placeholder="メッセージを入力... (Shift+Enter で改行、Enter で送信)"></textarea>
          <button id="send-btn" onclick="sendMessage()" title="送信">▶</button>
          <button id="stop-btn" onclick="stopGeneration()" title="生成を停止">■</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
